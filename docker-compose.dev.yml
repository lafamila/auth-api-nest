services:
  postgres:
    image: postgres:16
    container_name: teddy-auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teddy_auth
      TZ: Asia/Seoul
    ports:
      - "35432:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teddy_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teddy-auth-api
    ports:
      - "3032:3032"
    environment:
      PORT: 3032
      ISSUER_URL: http://localhost:3032
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/teddy_auth
      RUN_MIGRATIONS: "true"
      CORS_ORIGINS: http://localhost:3032,http://localhost:3030,http://localhost:3031
      COOKIE_SECRET: dev-cookie-secret
      ADMIN_SESSION_COOKIE_NAME: tas_admin_session
      ADMIN_OTP_ENCRYPTION_KEY: dev-admin-otp-encryption-key-change-me
      SIGNUP_EMAIL_CODE_PEPPER: dev-signup-email-code-pepper
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: auth@lafamila.xyz
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  auth-postgres-data:
