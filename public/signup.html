<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teddy Auth Signup</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --panel: #ffffff;
        --line: #d9dee8;
        --text: #162033;
        --muted: #657084;
        --accent: #1769aa;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(480px, calc(100vw - 32px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 24px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 22px;
      }

      form,
      .stack {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        color: var(--text);
        font: inherit;
      }

      button {
        border: 1px solid var(--accent);
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 12px;
      }

      .secondary {
        background: #fff;
        color: var(--accent);
      }

      .hint,
      .message {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .message.error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Teddy Auth Signup</h1>
      <div class="stack">
        <form id="startForm">
          <label>Email <input id="email" type="email" autocomplete="email" required /></label>
          <button type="submit">Send Verification Code</button>
        </form>

        <form id="completeForm">
          <label>Login ID <input id="loginId" autocomplete="username" required /></label>
          <label>Name <input id="name" autocomplete="name" required /></label>
          <label>Verification Code <input id="code" required /></label>
          <label>Password <input id="password" type="password" autocomplete="new-password" required /></label>
          <button type="submit">Create Account</button>
        </form>

        <div class="hint">비밀번호는 8자리 이상이며 특수문자를 1개 이상 포함해야 합니다. 인증번호는 5분간 유효합니다.</div>
        <div class="message" id="message"></div>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);

      function setMessage(text, isError = false) {
        $('message').textContent = text;
        $('message').classList.toggle('error', isError);
      }

      async function post(path, body) {
        const response = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.message || error.error || response.statusText);
        }
        return response.json();
      }

      $('startForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          const result = await post('/api/signup/start', {
            email: $('email').value,
          });
          setMessage(`Verification code sent to ${result.email}`);
        } catch (error) {
          setMessage(error.message, true);
        }
      });

      $('completeForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await post('/api/signup/complete', {
            loginId: $('loginId').value,
            name: $('name').value,
            email: $('email').value,
            code: $('code').value,
            password: $('password').value,
          });
          setMessage('Account created. You can return to the service and log in.');
          event.currentTarget.reset();
        } catch (error) {
          setMessage(error.message, true);
        }
      });
    </script>
  </body>
</html>
