<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teddy Auth Admin</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --panel: #ffffff;
        --line: #d9dee8;
        --text: #162033;
        --muted: #657084;
        --accent: #1769aa;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .shell {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 0;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 16px;
      }

      main {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 18px;
        padding: 22px 0 40px;
      }

      section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .form {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px 10px;
        color: var(--text);
        font: inherit;
      }

      textarea {
        min-height: 74px;
        resize: vertical;
      }

      button {
        border: 1px solid var(--accent);
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 9px 12px;
      }

      button.secondary {
        background: #fff;
        color: var(--accent);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 10px;
      }

      .toolbar label {
        min-width: 260px;
        flex: 1;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        font-size: 12px;
      }

      .message {
        min-height: 22px;
        color: var(--muted);
        font-size: 13px;
      }

      .message.error {
        color: var(--danger);
      }

      .badge {
        display: inline-block;
        border-radius: 999px;
        background: #edf3fa;
        color: #174f7a;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 700;
      }

      @media (max-width: 880px) {
        main,
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="shell topbar">
        <h1>Teddy Auth Admin</h1>
        <button class="secondary" id="refreshAll">Refresh</button>
      </div>
    </header>

    <main class="shell">
      <aside class="stack">
        <section>
          <h2>Admin Access</h2>
          <div class="form">
            <label>
              x-admin-key
              <input id="adminKey" type="password" autocomplete="off" />
            </label>
            <button id="saveKey">Save Key</button>
            <div class="message" id="statusMessage"></div>
          </div>
        </section>

        <section>
          <h2>Create Account</h2>
          <form class="form" id="accountForm">
            <label>Login ID <input name="loginId" required /></label>
            <label>Name <input name="name" required /></label>
            <label>Email <input name="email" type="email" required /></label>
            <label>Password <input name="password" type="password" required minlength="12" /></label>
            <button>Create Account</button>
          </form>
        </section>

        <section>
          <h2>Create Service</h2>
          <form class="form" id="serviceForm">
            <label>Service Key <input name="serviceKey" placeholder="todo" required /></label>
            <label>Name <input name="name" required /></label>
            <label>Description <textarea name="description"></textarea></label>
            <button>Create Service</button>
          </form>
        </section>

        <section>
          <h2>Add Permission</h2>
          <form class="form" id="permissionForm">
            <label>Service <select name="serviceId" id="permissionService"></select></label>
            <label>Key <input name="key" placeholder="admin" required /></label>
            <label>Label <input name="label" required /></label>
            <label>Description <textarea name="description"></textarea></label>
            <button>Add Permission</button>
          </form>
        </section>
      </aside>

      <div class="stack">
        <section>
          <div class="toolbar">
            <h2>Accounts</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Login ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Status</th>
                <th>Role</th>
              </tr>
            </thead>
            <tbody id="accountsBody"></tbody>
          </table>
        </section>

        <section>
          <div class="toolbar">
            <h2>Services</h2>
          </div>
          <table>
            <thead>
              <tr>
                <th>Key</th>
                <th>Name</th>
                <th>Status</th>
                <th>Permission Version</th>
              </tr>
            </thead>
            <tbody id="servicesBody"></tbody>
          </table>
        </section>

        <section>
          <div class="toolbar">
            <label>
              Permission Service
              <select id="permissionListService"></select>
            </label>
            <button class="secondary" id="loadPermissions">Load Permissions</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>Key</th>
                <th>Label</th>
                <th>Status</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody id="permissionsBody"></tbody>
          </table>
        </section>
      </div>
    </main>

    <script>
      const state = {
        accounts: [],
        services: [],
      };

      const $ = (id) => document.getElementById(id);
      const adminKeyInput = $('adminKey');
      const statusMessage = $('statusMessage');

      adminKeyInput.value = localStorage.getItem('teddy-auth-admin-key') || 'dev-admin-key';

      function setStatus(text, isError = false) {
        statusMessage.textContent = text;
        statusMessage.classList.toggle('error', isError);
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            'x-admin-key': adminKeyInput.value,
            ...(options.headers || {}),
          },
        });
        if (!response.ok) {
          const error = await response.json().catch(() => ({}));
          throw new Error(error.message || error.error || response.statusText);
        }
        if (response.status === 204) {
          return null;
        }
        return response.json();
      }

      function renderAccounts() {
        $('accountsBody').innerHTML = state.accounts
          .map(
            (account) => `
              <tr>
                <td>${account.loginId}</td>
                <td>${account.name}</td>
                <td>${account.email}</td>
                <td><span class="badge">${account.status}</span></td>
                <td>${account.isSuperAdmin ? 'super admin' : 'user'}</td>
              </tr>
            `,
          )
          .join('');
      }

      function renderServices() {
        $('servicesBody').innerHTML = state.services
          .map(
            (service) => `
              <tr>
                <td>${service.serviceKey}</td>
                <td>${service.name}</td>
                <td><span class="badge">${service.status}</span></td>
                <td>${service.permissionSchemaVersion}</td>
              </tr>
            `,
          )
          .join('');

        const options = state.services
          .map((service) => `<option value="${service.id}">${service.serviceKey}</option>`)
          .join('');
        $('permissionService').innerHTML = options;
        $('permissionListService').innerHTML = options;
      }

      function renderPermissions(permissions) {
        $('permissionsBody').innerHTML = permissions
          .map(
            (permission) => `
              <tr>
                <td>${permission.key}</td>
                <td>${permission.label}</td>
                <td><span class="badge">${permission.status}</span></td>
                <td>${permission.description || ''}</td>
              </tr>
            `,
          )
          .join('');
      }

      async function refreshAll() {
        try {
          const [accounts, services] = await Promise.all([
            api('/api/admin/accounts'),
            api('/api/admin/services'),
          ]);
          state.accounts = accounts;
          state.services = services;
          renderAccounts();
          renderServices();
          if (services[0]) {
            await loadPermissions(services[0].id);
          } else {
            renderPermissions([]);
          }
          setStatus('Loaded');
        } catch (error) {
          setStatus(error.message, true);
        }
      }

      async function loadPermissions(serviceId = $('permissionListService').value) {
        if (!serviceId) {
          renderPermissions([]);
          return;
        }
        const permissions = await api(`/api/admin/services/${serviceId}/permissions`);
        renderPermissions(permissions);
      }

      function formJson(form) {
        return Object.fromEntries(new FormData(form).entries());
      }

      $('saveKey').addEventListener('click', () => {
        localStorage.setItem('teddy-auth-admin-key', adminKeyInput.value);
        setStatus('Saved');
        void refreshAll();
      });

      $('refreshAll').addEventListener('click', () => void refreshAll());
      $('loadPermissions').addEventListener('click', () => void loadPermissions());

      $('accountForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await api('/api/admin/accounts', {
            method: 'POST',
            body: JSON.stringify(formJson(event.currentTarget)),
          });
          event.currentTarget.reset();
          await refreshAll();
          setStatus('Account created');
        } catch (error) {
          setStatus(error.message, true);
        }
      });

      $('serviceForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await api('/api/admin/services', {
            method: 'POST',
            body: JSON.stringify(formJson(event.currentTarget)),
          });
          event.currentTarget.reset();
          await refreshAll();
          setStatus('Service created');
        } catch (error) {
          setStatus(error.message, true);
        }
      });

      $('permissionForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const values = formJson(event.currentTarget);
        const { serviceId, ...payload } = values;
        try {
          await api(`/api/admin/services/${serviceId}/permissions`, {
            method: 'POST',
            body: JSON.stringify(payload),
          });
          event.currentTarget.reset();
          await refreshAll();
          setStatus('Permission added');
        } catch (error) {
          setStatus(error.message, true);
        }
      });

      void refreshAll();
    </script>
  </body>
</html>
