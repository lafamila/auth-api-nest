<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Teddy Auth Admin</title>
    <style>
      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #172033;
      }
      main {
        max-width: 880px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      section {
        border: 1px solid #d7dce5;
        border-radius: 8px;
        background: #fff;
        padding: 24px;
      }
      code {
        background: #edf1f6;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Teddy Auth Admin</h1>
      <section>
        <p>
          Phase 1 exposes admin APIs under <code>/api/admin</code> and OAuth/OIDC
          endpoints under <code>/oauth</code>, <code>/oidc</code>, and
          <code>/.well-known</code>.
        </p>
        <p>
          Use <code>x-admin-key</code> for initial admin API access until the
          hardened Phase 2 console replaces this minimal shell.
        </p>
      </section>
    </main>
  </body>
</html>
